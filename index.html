<div class="app">

<div class="notice"><div class="noticeIcon">!</div><div data-i18n="mainNotice"></div></div>

<section class="card"><h2 class="sectionTitle" data-i18n="productLibrary"></h2><p class="sectionHint" data-i18n="productHint"></p><div class="productGrid" id="productGrid"></div></section>
<div class="formGrid">
<section class="card"><h2 class="sectionTitle" data-i18n="setup"></h2>
<div id="boxStyleWrap"><label data-i18n="boxStructure"></label><select id="boxStyle"></select></div>
<div id="dimensionsCard"><label data-i18n="dimensions"></label><div class="grid3"><div><label data-i18n="length"></label><input id="L" type="number" value="10" step="0.1"></div><div><label data-i18n="width"></label><input id="W" type="number" value="10" step="0.1"></div><div><label data-i18n="height"></label><input id="H" type="number" value="3" step="0.1"></div></div><div class="autoBox"><div><strong data-i18n="autoDieline"></strong> <span id="autoDieline">—</span></div><div><strong data-i18n="autoUnits"></strong> <span id="autoUnits">—</span></div><div id="autoWarning" class="warning hidden"></div></div><label class="checkLine"><input type="checkbox" id="useOverride"><span data-i18n="manualOverride"></span></label><input id="manualUnits" type="number" value="1" min="1"><label data-i18n="dielinePartsMode"></label><select id="dielinePartsMode"><option value="separate"></option><option value="fullSet"></option></select></div>
</section>
<section class="card"><h2 class="sectionTitle" data-i18n="materialPrinting"></h2><div id="materialCard"><label data-i18n="paperType"></label><select id="paper"></select><label data-i18n="printingType"></label><select id="print"></select><label data-i18n="printColors"></label><select id="printColors"></select><label data-i18n="lamination"></label><select id="lamination"></select></div><label data-i18n="quantity"></label><input id="qty" type="number" value="500"><label data-i18n="formCost"></label><input id="formCost" type="number" value="1500"><label data-i18n="transport"></label><input id="transport" type="number" value="1000"></section>
</div>
<section class="card" id="extrasCard"><h2 class="sectionTitle" data-i18n="extras"></h2><div id="boxExtras"><label class="checkLine"><input type="checkbox" id="emboss"><span data-i18n="emboss"></span></label><label class="checkLine"><input type="checkbox" id="spot"><span data-i18n="spot"></span></label><label class="checkLine"><input type="checkbox" id="windowPlastic"><span data-i18n="windowPlastic"></span></label></div><div id="bagExtras"><label data-i18n="handleType"></label><select id="handleType"></select><label class="checkLine"><input type="checkbox" id="bagGlue" checked><span data-i18n="bagGlue"></span></label></div><label data-i18n="specialColors"></label><input type="number" id="specialColors" value="0"></section>
<section class="priceCard"><div class="priceRow"><div style="display:flex;gap:13px;align-items:center"><div class="calcCircle">🧮</div><div><p class="priceTitle" data-i18n="totalPrice"></p><p class="priceArabic" data-i18n="finalClientPrice"></p></div></div><div class="bigPrice"><span id="priceNumber">0</span> <span data-i18n="currency"></span></div></div><p class="priceNote" id="priceNote">—</p></section>
<section class="actions"><button onclick="copyPrice()" data-i18n="copyPrice"></button><button class="green" onclick="sendWhatsApp()" data-i18n="sendWhatsApp"></button><button class="blue" onclick="calculate()" data-i18n="calculate"></button></section>
<section class="breakdown"><h3 data-i18n="breakdown"></h3><div id="breakdownLines"></div></section><div class="footerBrand">MT Advertising Agency · V7.2 Clean SVG</div>
</main></div>

const R={wastage:.10,sheets:{main:{w:100,h:70},butter:{w:60,h:80}},paper:{whiteTop:10.3,finnish:14,flandy:9,kraft:4.5,coatedBag:12,sticker:16,butter:0},print:{quarter:{p:500,z:350},half:{p:850,z:500},full:{p:2000,z:650}},creasing:400,creasingComplex:600,glueFlap:1.5,innerWall:1.5,tolerance:.5,bagGlue:850,emboss:.8,spot:800,window:1,specialColor:600,cards:{personal:{price:870},thankyou:{price:1300}},profits:{boxBag:[[500,3500],[1000,4500],[2000,5000]],small:[[500,350],[1000,1200],[24000,4500]],butterPack:2000}};
const PRODUCTS=["onePiece","baseLid","drawer","cosmetic","bagCoated","bagKraft","sticker","card","butter","sandwich"].map(id=>({id,cat:["onePiece","baseLid","drawer","cosmetic"].includes(id)?"box":["bagCoated","bagKraft"].includes(id)?"bag":id}));

function t(k){return I[currentLang][k]}function el(id){return document.getElementById(id)}function v(id){return Number(el(id)?.value)||0}function checked(id){return !!el(id)?.checked}function money(n){return Math.round(n).toLocaleString("en-US")}function ceil1000(q){return Math.max(1,Math.ceil(q/1000))}function fitUnits(dw,dh,s=R.sheets.main){if(dw<=0||dh<=0)return 0;return Math.max(Math.floor(s.w/dw)*Math.floor(s.h/dh),Math.floor(s.w/dh)*Math.floor(s.h/dw))}
function profit(type,qty){if(type==="butter")return Math.ceil(qty/500)*R.profits.butterPack;let arr=(type==="box"||type==="bag")?R.profits.boxBag:R.profits.small,p=arr[0][1];for(const [q,val] of arr){if(qty>=q)p=val}return p}function line(a,b){return `<div class="costLine"><span>${a}</span><strong>${money(b)} ${t("currency")}</strong></div>`}
function dieline(style,L,W,H){let gf=R.glueFlap,iw=R.innerWall,tol=R.tolerance;switch(style){case"onePiece":return{parts:1,w:2*L+2*W+gf+tol,h:L+4*H+tol,complex:false};case"baseLidNoWall":return{parts:2,w:L+2*H+tol,h:W+2*H+tol,complex:false};case"baseLidWall":return{parts:2,w:L+2*H+2*iw+tol,h:W+2*H+2*iw+tol,complex:true};case"drawer":return{parts:2,w:2*L+2*W+gf+tol,h:W+2*H+tol,complex:true};case"cosmeticTuck":return{parts:1,w:2*L+2*W+gf+tol,h:H+2*W+tol,complex:false};case"cosmeticLock":return{parts:1,w:2*L+2*W+gf+tol,h:H+2.5*W+tol,complex:true};default:return{parts:1,w:L,h:W,complex:false}}}
function renderStaticText(){document.querySelectorAll("[data-i18n]").forEach(n=>n.textContent=t(n.dataset.i18n));el("boxStyle").innerHTML=Object.entries(I[currentLang].boxStyles).map(([k,v])=>`<option value="${k}">${v}</option>`).join("");el("print").innerHTML=Object.entries(I[currentLang].prints).map(([k,v])=>`<option value="${k}">${v}</option>`).join("");el("printColors").innerHTML=`<option value="4">4 ${currentLang==="ar"?"ألوان":"Colors"}</option><option value="3">3 ${currentLang==="ar"?"ألوان":"Colors"}</option><option value="2">2 ${currentLang==="ar"?"لون":"Colors"}</option><option value="1">1 ${currentLang==="ar"?"لون":"Color"}</option>`;el("lamination").innerHTML=`<option value="3.5">${I[currentLang].lams.yes}</option><option value="0">${I[currentLang].lams.no}</option>`;el("handleType").innerHTML=`<option value="0">${I[currentLang].handles.no}</option><option value="1">${I[currentLang].handles.kraft}</option><option value="2.5">${I[currentLang].handles.rope}</option>`;el("dielinePartsMode").innerHTML=`<option value="separate">${t("separateParts")}</option><option value="fullSet">${t("fullSet")}</option>`}
function buildProducts(){el("productGrid").innerHTML=PRODUCTS.map(p=>`<div class="productCard ${p.id===product?'active':''}" onclick="selectProduct('${p.id}')">${SVG[p.id]}<div class="pLabel">${I[currentLang].products[p.id]}</div></div>`).join("")}
function paperOptions(){let p=PRODUCTS.find(x=>x.id===product),opts=[];if(p.cat==="bag")opts=product==="bagCoated"?["coatedBag"]:["kraft"];else if(p.cat==="sticker")opts=["sticker"];else if(p.cat==="butter")opts=["butter"];else opts=["whiteTop","finnish","flandy","kraft"];el("paper").innerHTML=opts.map(k=>`<option value="${R.paper[k]}">${I[currentLang].papers[k]} — ${R.paper[k]}</option>`).join("")}
function setMode(m){mode=m;el("estimateBtn").classList.toggle("active",m==="estimate");el("productionBtn").classList.toggle("active",m==="production");if(m==="production")el("useOverride").checked=true;calculate()}
function selectProduct(id){product=id;buildProducts();let p=PRODUCTS.find(x=>x.id===product);el("boxStyleWrap").classList.toggle("hidden",p.cat!=="box");el("dimensionsCard").classList.toggle("hidden",p.cat==="card");el("materialCard").classList.toggle("hidden",p.cat==="card");el("extrasCard").classList.toggle("hidden",p.cat==="card"||p.cat==="butter");el("boxExtras").classList.toggle("hidden",p.cat!=="box");el("bagExtras").classList.toggle("hidden",p.cat!=="bag");paperOptions();if(product==="bagKraft"){el("lamination").value="0";el("lamination").disabled=true}else{el("lamination").disabled=false}calculate()}
function autoCalcUnits(){let p=PRODUCTS.find(x=>x.id===product),L=v("L"),W=v("W"),H=v("H"),dw=L,dh=W,parts=1,complex=false,s=R.sheets.main;if(p.cat==="box"){let d=dieline(el("boxStyle").value,L,W,H);dw=d.w;dh=d.h;parts=d.parts;complex=d.complex}else if(p.cat==="bag"){dw=2*L+2*W+3;dh=H+W+6}else if(p.cat==="sandwich"){dw=L+3;dh=W+3}else if(p.cat==="butter"){s=R.sheets.butter}let u=fitUnits(dw,dh,s);el("autoDieline").textContent=`${dw.toFixed(1)} × ${dh.toFixed(1)} cm ${parts>1?`× ${parts}`:''}`;el("autoUnits").textContent=u||t("needsReview");let warn=el("autoWarning");warn.classList.toggle("hidden",u>0&&mode==="estimate");if(u<=0)warn.textContent=t("fitWarn");else if(mode==="production")warn.textContent=t("prodWarn");return{units:u,dw,dh,parts,complex}}
function calculate(){let p=PRODUCTS.find(x=>x.id===product),qty=v("qty"),breakdown="",total=0,details=autoCalcUnits();if(qty<=0)return;let transport=v("transport");if(p.cat==="card"){let cost=R.cards.personal.price*ceil1000(qty),prof=profit("card",qty),special=v("specialColors")*R.specialColor;total=cost+special+transport+prof;breakdown+=line(t("cardsCost"),cost)+(special?line(t("specialColorsLine"),special):"")+line(t("transportLine"),transport)+line(t("profitLine"),prof)}else{let units=checked("useOverride")?v("manualUnits"):details.units;if(!units)units=1;let partMultiplier=(checked("useOverride")&&el("dielinePartsMode").value==="fullSet")?1:(details.parts||1);let productionSheets=(qty/units)*partMultiplier;let sheets=(qty*(1+R.wastage)/units)*partMultiplier,paper=sheets*v("paper"),m=ceil1000(qty),pr=R.print[el("print").value],colorFactor=(v("printColors")||4)/4,printing=pr.p*m*colorFactor,plates=pr.z*colorFactor,lam=(p.cat==="bag"&&product==="bagKraft")?0:sheets*v("lamination"),creas=(details.complex?R.creasingComplex:R.creasing)*m,form=v("formCost"),prof=profit(p.cat,qty),extras=0;if(p.cat==="box"){if(checked("emboss"))extras+=qty*R.emboss;if(checked("spot"))extras+=m*R.spot;if(checked("windowPlastic"))extras+=qty*R.window}if(p.cat==="bag"){if(checked("bagGlue"))extras+=m*R.bagGlue;extras+=qty*v("handleType")}extras+=v("specialColors")*R.specialColor;if(p.cat==="butter"){prof=Math.max(2000,productionSheets*3.36);form=0;creas=0}total=paper+printing+plates+lam+creas+form+transport+extras+prof;breakdown+=(p.cat==="butter"?line(t("butterSheets"),productionSheets.toFixed(2)):"")+line(t("paperCost"),paper)+line(t("printingCost"),printing)+line(t("platesCost"),plates)+(lam?line(t("laminationCost"),lam):"")+(creas?line(t("cuttingCost"),creas):"")+(form?line(t("formLine"),form):"")+(extras?line(t("extrasLine"),extras):"")+line(t("transportLine"),transport)+line(t("profitLine"),prof)}let per=total/qty;el("priceNumber").textContent=money(total);el("breakdownLines").innerHTML=breakdown+line(t("pieceLine"),per.toFixed(2));el("priceNote").textContent=mode==="production"?t("productionNote"):t("estimateNote");finalMsg=`${t("product")}: ${I[currentLang].products[product]}\n${t("qty")}: ${qty.toLocaleString("en-US")}\n\n${t("finalPrice")}: ${money(total)} ${t("currency")}\n${t("piecePrice")}: ${per.toFixed(2)} ${t("currency")}\n\n${t("clientMsgReady")}`}
function copyPrice(){calculate();navigator.clipboard.writeText(finalMsg).then(()=>alert(t("priceCopied")))}function sendWhatsApp(){calculate();window.open("https://wa.me/?text="+encodeURIComponent(finalMsg),"_blank")}function notifyInfo(){alert(t("notify"))}
function setLang(l){currentLang=l;document.documentElement.lang=l;document.documentElement.dir=l==="ar"?"rtl":"ltr";let old={style:el("boxStyle").value,print:el("print").value,colors:el("printColors").value,lam:el("lamination").value,handle:el("handleType").value,partsMode:el("dielinePartsMode").value};renderStaticText();el("boxStyle").value=old.style||"onePiece";el("print").value=old.print||"quarter";el("printColors").value=old.colors||"4";el("lamination").value=old.lam||"3.5";el("handleType").value=old.handle||"0";el("dielinePartsMode").value=old.partsMode||"separate";el("enBtn").classList.toggle("active",l==="en");el("arBtn").classList.toggle("active",l==="ar");buildProducts();paperOptions();calculate()}
["boxStyle","L","W","H","paper","print","printColors","lamination","qty","formCost","transport","emboss","spot","windowPlastic","bagGlue","handleType","specialColors","useOverride","manualUnits","dielinePartsMode"].forEach(id=>{document.addEventListener("input",e=>{if(e.target&&e.target.id===id)calculate()});document.addEventListener("change",e=>{if(e.target&&e.target.id===id)calculate()})});
